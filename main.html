<!DOCTYPE html>
<html lang="en">
<head>
  <title>Happy Birthday 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    .main-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 70px;
      position: relative;
      z-index: 2;
      animation: pageReveal 1.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes pageReveal {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rose-orbit {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 16px;
    }
    .rose-emoji {
      font-size: 52px;
      display: block;
      text-align: center;
      line-height: 100px;
      animation: floatRose 3.8s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(201,72,91,0.5));
    }
    .rose-orbit::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.2);
      animation: roseSpin 8s linear infinite;
    }
    @keyframes floatRose {
      0%,100%{ transform: translateY(0) rotate(-3deg) scale(1); }
      50%    { transform: translateY(-12px) rotate(3deg) scale(1.05); }
    }
    @keyframes roseSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .main-sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.35rem);
      color: rgba(247,214,208,0.48);
      letter-spacing: 0.14em;
      margin: 14px 0 10px;
      line-height: 2;
    }
    .main-note {
      max-width: 500px;
      margin: 28px auto 0;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      color: rgba(247,214,208,0.7);
      line-height: 2.2;
    }

    /* Decorative quote marks */
    .main-note::before {
      content: '"';
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      color: rgba(201,169,110,0.12);
      line-height: 0;
      vertical-align: -2rem;
      margin-right: 0.1em;
    }
  </style>
</head>
<body>
<audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
<script src="bgmusic.js"></script>

<div class="main-wrap">
  <div class="rose-orbit">
    <span class="rose-emoji">🌹</span>
  </div>
  <h1>Happy Birthday My Love</h1>
  <p class="main-sub">today is yours — every moment, every memory</p>
  <div class="divider"></div>
  <p class="main-note">
    i made something for you, from the deepest corner of my heart.<br>
    every page here is a little piece of what you mean to me. ❤️
  </p>
  <button onclick="start()">Begin Our Journey &nbsp;→</button>
</div>

<script>
function start(){
  document.body.style.opacity = "0";
  document.body.style.transition = "1.2s";
  setTimeout(() => window.location = "gallery.html", 1200);
}
</script>
<script src="hearts.js"></script>
</body>
</html>
