<!DOCTYPE html>
<html>
<head>

<title>Love 💝</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 💖 BACKGROUND */
html, body{
margin:0;
padding:0;
height:100%;
width:100%;
overflow:hidden;
font-family:Arial;
background: linear-gradient(180deg,#e88c8c,#f2aaaa,#f5bcbc);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* 📦 CONTAINER */
#container{
position:fixed;
width:100%;
height:100%;
z-index:1;
}

/* 📸 PHOTOS */
.photo{
position:absolute;
width:22vw;
height:22vw;
max-width:110px;
max-height:110px;
background-size:cover;
background-position:center;
border-radius:12px;
transition:all 1.5s ease;
}

/* 🌟 FINAL IMAGE */
#finalImage{
width:80vw;
max-width:350px;
height:80vw;
max-height:450px;

background-size:cover;
background-position:center;
border-radius:15px;

opacity:0;
z-index:5;
transition:2s;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* 💝 TEXT */
#finalText{
margin-top:20px;
font-size:4.5vw;
color:#b0003a;
font-weight:bold;
text-align:center;

opacity:1;
z-index:6;
}

</style>

</head>

<body>

<div id="container"></div>

<div id="finalImage"></div>
<div id="finalText"></div>

<script>

// 🎯 IMAGES
let images=[];
for(let i=1;i<=30;i++){
images.push(`S (${i}).jpeg`);
}

const container=document.getElementById("container");
let photos=[];

// 📸 CREATE
for(let i=0;i<images.length;i++){

let div=document.createElement("div");
div.className="photo";

div.style.backgroundImage=`url("${images[i]}")`;
div.style.top=Math.random()*100+"vh";
div.style.left=Math.random()*100+"vw";

container.appendChild(div);
photos.push(div);
}

// 🎬 FLOAT
let float=setInterval(()=>{
photos.forEach(p=>{
p.style.top=Math.random()*100+"vh";
p.style.left=Math.random()*100+"vw";
});
},2000);

// 🛑 STOP FLOAT
setTimeout(()=>{
clearInterval(float);
},5000);

// ❌ FADE PHOTOS
setTimeout(()=>{
photos.forEach(p=>{
p.style.opacity="0";
});
},6000);

// 🌟 SHOW IMAGE
setTimeout(()=>{

let finalImg=document.getElementById("finalImage");
finalImg.style.backgroundImage="url('special.jpeg')";
finalImg.style.opacity="1";

},7000);

// ⌨️ TYPING EFFECT
setTimeout(()=>{

let text = "I love you soooooooo muchhhhhhh Baykooo ❤️";
let i=0;
let speed=50;

function type(){
if(i<text.length){
document.getElementById("finalText").innerHTML += text.charAt(i);
i++;
setTimeout(type,speed);
}
}

type();

},8500);

</script>

</body>
</html>
