<!DOCTYPE html>
<html lang="en">
<head>
  <title>Our Memories 💝</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose: #c9485b;
      --gold: #c9a96e;
      --soft-gold: #e8d5b0;
      --blush: #f7d6d0;
      --dark: #1a0a0d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--dark);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,72,91,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,26,46,0.10) 0%, transparent 40%),
        linear-gradient(180deg, #1a0a0d 0%, #2d0f18 50%, #1a0a0d 100%);
      pointer-events: none;
      z-index: 0;
    }

    .page-title {
      text-align: center;
      padding: 50px 20px 30px;
      position: relative;
      z-index: 1;
    }

    .page-title h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 7vw, 4rem);
      color: transparent;
      background: linear-gradient(135deg, #f7d6d0, #c9a96e, #c9485b, #f7d6d0);
      -webkit-background-clip: text;
      background-clip: text;
      background-size: 300%;
      animation: shimmer 4s ease infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0%; }
      50% { background-position: 100%; }
    }

    .page-title .sub {
      font-style: italic;
      color: rgba(247,214,208,0.50);
      font-size: 1.05rem;
      letter-spacing: 0.18em;
      margin-top: 10px;
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
    }

    /* GRID — 150px columns */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 10px 14px 110px;
      position: relative;
      z-index: 1;
    }

    #gallery img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      filter: brightness(0.92) saturate(1.1);
      border: 1px solid rgba(201,169,110,0.10);
    }

    #gallery img:hover {
      transform: scale(1.08) translateY(-5px);
      box-shadow: 0 18px 45px rgba(201,72,91,0.35), 0 0 0 1px rgba(201,169,110,0.3);
      filter: brightness(1.08) saturate(1.25);
    }

    /* NEXT BUTTON */
    .next-wrap {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .next-btn {
      padding: 16px 45px;
      border: 1px solid rgba(201,169,110,0.4);
      border-radius: 50px;
      background: linear-gradient(135deg, rgba(201,72,91,0.4), rgba(139,26,46,0.55));
      color: var(--soft-gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      backdrop-filter: blur(20px);
      transition: all 0.4s ease;
      box-shadow: 0 0 35px rgba(201,72,91,0.25);
    }

    .next-btn:hover {
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 0 60px rgba(201,72,91,0.45);
      border-color: var(--gold);
      color: #fff;
    }

    /* VIEWER */
    #viewer {
      position: fixed;
      inset: 0;
      background: rgba(5, 1, 2, 0.97);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      animation: fadeIn 0.3s ease;
    }

    #viewer.active { display: flex; }

    #viewer img {
      max-width: 88%;
      max-height: 55vh;
      border-radius: 20px;
      box-shadow: 0 0 100px rgba(201,72,91,0.3);
      object-fit: contain;
    }

    #viewerCaption {
      margin-top: 22px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: rgba(247,214,208,0.80);
      text-align: center;
      padding: 0 28px;
      max-width: 520px;
      line-height: 1.9;
    }

    #viewerCounter {
      margin-top: 10px;
      font-size: 0.8rem;
      color: rgba(201,169,110,0.45);
      letter-spacing: 0.2em;
    }

    .viewer-controls {
      display: flex;
      gap: 16px;
      margin-top: 24px;
    }

    .v-btn {
      padding: 12px 30px;
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 50px;
      background: rgba(255,255,255,0.04);
      color: var(--blush);
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .v-btn:hover {
      background: rgba(201,72,91,0.25);
      border-color: rgba(201,72,91,0.5);
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 22px;
      font-size: 24px;
      color: rgba(247,214,208,0.3);
      cursor: pointer;
      transition: color 0.3s;
      background: none;
      border: none;
      padding: 8px;
    }

    .close-btn:hover { color: var(--rose); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(-10deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(10deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="page-title">
    <h1>Our Memories 💝</h1>
    <p class="sub">every photo, a moment i treasure forever</p>
    <div class="divider"></div>
  </div>

  <div id="gallery"></div>

  <div class="next-wrap">
    <button class="next-btn" onclick="goNext()">Read My Heart &nbsp;→</button>
  </div>

  <div id="viewer">
    <button class="close-btn" onclick="closeViewer()">✕</button>
    <img id="viewerImg" src="" alt="">
    <div id="viewerCaption"></div>
    <div id="viewerCounter"></div>
    <div class="viewer-controls">
      <button class="v-btn" onclick="prevPhoto()">←</button>
      <button class="v-btn" onclick="nextPhoto()">→</button>
    </div>
  </div>

  <script>
    const reasons = [
      "Your smile is the first thing I think of every morning 🌸",
      "The way you laugh makes the whole world feel lighter",
      "I feel like the luckiest person alive because of you",
      "You understand me like no one else ever has",
      "Your happiness is all that truly matters to me",
      "You make even the smallest moments feel magical",
      "I can be completely myself only when I'm with you",
      "You bring a peace to my life I never knew was possible",
      "Your voice is my favourite sound in the entire world",
      "You make me want to be a better person every single day",
      "You are the reason I smile for absolutely no reason",
      "Everything feels right when I'm with you",
      "You care about me in ways no one else ever does",
      "You are my safe place, always and forever",
      "You give meaning to everything I do",
      "Just your presence alone is more than enough for me",
      "You always stand by me, no matter what happens",
      "You make me feel like I truly matter in this world",
      "You bring warmth into every room you walk into",
      "With you, I finally know what real love feels like",
      "You are always on my mind, every single moment",
      "You make my heart feel so incredibly full",
      "You are my absolute favourite person on this earth",
      "Even on my worst days, you make everything better",
      "You complete me in ways I can't even begin to explain",
      "You are my happiness, my light, my reason",
      "You give me a strength I never knew I had inside me",
      "You make life so beautifully and completely worth living",
      "You are my peace in the middle of all the chaos",
      "Everything feels worth it because of you",
      "Your eyes hold a calm I love getting completely lost in",
      "The way you care about the smallest things melts my heart",
      "You are the most beautiful person I have ever seen",
      "You make ordinary days feel like something out of a dream",
      "Your little habits that only I get to notice and love",
      "You make love feel simple, real, and deeply true",
      "You are my favourite person to talk to about everything",
      "You understand my silence better than anyone ever could",
      "You make every single moment feel deeply meaningful",
      "Your heart is so pure, so gentle, so genuinely beautiful",
      "You make my problems feel smaller just by being near",
      "Your happiness becomes my happiness, always",
      "You give me strength when I feel the weakest",
      "Your love feels so safe, so warm, so endlessly real",
      "You make me feel important and seen and loved",
      "Your presence makes my whole world feel calmer",
      "You make me believe in love all over again",
      "You make my heart race and feel at peace at the same time",
      "You are the chapter in my life I never want to end",
      "I fall in love with you again and again, every single day 💖",
    ];

    let images = [];
    let currentIndex = 0;
    const gallery = document.getElementById("gallery");
    const viewer = document.getElementById("viewer");

    for (let i = 1; i <= 144; i++) {
      const src = `S (${i}).jpeg`;
      images.push(src);
      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      img.onclick = (function(idx){ return function(){ currentIndex = idx; openViewer(); }; })(i - 1);
      gallery.appendChild(img);
    }

    function openViewer() {
      viewer.classList.add("active");
      document.getElementById("viewerImg").src = images[currentIndex];
      document.getElementById("viewerCaption").innerText = reasons[currentIndex % reasons.length];
      document.getElementById("viewerCounter").innerText = `${currentIndex + 1} / ${images.length}`;
    }

    function closeViewer() { viewer.classList.remove("active"); }
    function nextPhoto() { currentIndex = (currentIndex + 1) % images.length; openViewer(); }
    function prevPhoto() { currentIndex = (currentIndex - 1 + images.length) % images.length; openViewer(); }

    let startX = 0;
    viewer.addEventListener("touchstart", e => startX = e.touches[0].clientX);
    viewer.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (dx < -50) nextPhoto();
      else if (dx > 50) prevPhoto();
    });

    function goNext() {
      document.body.style.opacity = '0';
      document.body.style.transition = '1s';
      setTimeout(() => window.location = "reasons.html", 1000);
    }
  </script>

  <script src="hearts.js"></script>
</body>
</html>
